name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Assemble static site
        run: |
          mkdir -p site
          rsync -a --delete \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude '.venv/' \
            --exclude '__pycache__/' \
            --exclude 'node_modules/' \
            --exclude 'src/' \
            --exclude 'tests/' \
            --exclude 'output/' \
            --exclude 'logs/' \
            --exclude 'main.py' \
            --exclude 'requirements.txt' \
            --exclude 'package-lock.json' \
            --exclude 'monitorar_inputs.bat' \
            --exclude 'gerar_relatorio.bat' \
            ./ site/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
